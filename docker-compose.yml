version: '3.8'

services:
  # Express API
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pool-finder-api
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    networks:
      - pool-finder-network

  # React Native / Expo Web Development Server
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pool-finder-app
    ports:
      - "8081:8081"   # Expo web (open http://localhost:8081 in your browser)
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    environment:
      - NODE_ENV=development
      # Browser fetches the API directly from the host machine, not via the Docker network
      - EXPO_PUBLIC_API_URL=http://localhost:3001
    depends_on:
      - api
    stdin_open: true
    tty: true
    networks:
      - pool-finder-network

volumes:
  node_modules:
  backend_node_modules:

networks:
  pool-finder-network:
    driver: bridge
