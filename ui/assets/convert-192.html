<!DOCTYPE html>
<html>
<head>
    <title>Create 192x192 Icon</title>
    <style>
        body { font-family: system-ui; padding: 20px; }
        button { padding: 15px 30px; font-size: 16px; cursor: pointer; background: #007AFF; color: white; border: none; border-radius: 8px; }
    </style>
</head>
<body>
    <h1>Create icon-192.png</h1>
    <div id="output"></div>

    <script>
        const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="192" height="192">
  <rect width="200" height="200" rx="44" fill="#0a0d12"/>
  <g fill="none" stroke="#5DCAA5" stroke-linecap="round" stroke-width="11">
    <path d="M 28 68 Q 65 48 100 68 T 172 68" opacity="0.28"/>
    <path d="M 28 100 Q 65 80 100 100 T 172 100"/>
    <path d="M 28 132 Q 65 112 100 132 T 172 132" opacity="0.28"/>
  </g>
  <circle cx="100" cy="100" r="8" fill="#ffffff"/>
</svg>`;

        const canvas = document.createElement('canvas');
        canvas.width = 192;
        canvas.height = 192;
        const ctx = canvas.getContext('2d');

        const img = new Image();
        const blob = new Blob([svg], { type: 'image/svg+xml' });
        const url = URL.createObjectURL(blob);

        img.onload = function() {
            ctx.drawImage(img, 0, 0, 192, 192);
            URL.revokeObjectURL(url);

            const preview = document.createElement('canvas');
            preview.width = 192;
            preview.height = 192;
            preview.style.border = '1px solid #ccc';
            const previewCtx = preview.getContext('2d');
            previewCtx.drawImage(canvas, 0, 0);
            document.getElementById('output').appendChild(preview);

            const br = document.createElement('br');
            document.getElementById('output').appendChild(br);

            const downloadBtn = document.createElement('button');
            downloadBtn.textContent = 'Download icon-192.png';
            downloadBtn.onclick = function() {
                canvas.toBlob(function(blob) {
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = 'icon-192.png';
                    a.click();
                }, 'image/png');
            };
            document.getElementById('output').appendChild(downloadBtn);

            const instructions = document.createElement('p');
            instructions.innerHTML = '<br><strong>Save to:</strong> ui/assets/icon-192.png<br>Then update favicon.png to be 192x192 as well by renaming this file.';
            document.getElementById('output').appendChild(instructions);
        };

        img.src = url;
    </script>
</body>
</html>
